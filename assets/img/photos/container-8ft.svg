<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Diagram of an 8ft by 6ft 6in storage container with double doors on the front">
  <rect width="640" height="360" fill="#e9eff4"/>
  <rect x="0" y="300" width="640" height="60" fill="#d7dfe6"/>

  <!-- ground shadow -->
  <ellipse cx="330" cy="305" rx="200" ry="18" fill="#c3ccd4"/>

  <!-- ROOF -->
  <polygon points="330,128 486,128 356,88 200,88" fill="#2a5d80"/>

  <!-- SIDE (short 8ft length receding back-left) -->
  <polygon points="330,128 200,88 200,258 330,300" fill="#1a4763"/>
  <g stroke="#163a52" stroke-width="6" opacity=".55">
    <line x1="232" y1="93" x2="232" y2="262"/>
    <line x1="268" y1="98" x2="268" y2="270"/>
    <line x1="304" y1="103" x2="304" y2="278"/>
  </g>

  <!-- FRONT DOOR END (6ft6 wide face, facing viewer) -->
  <rect x="330" y="128" width="156" height="172" fill="#1E4C6B"/>
  <rect x="330" y="128" width="10" height="172" fill="#163a52"/>
  <rect x="476" y="128" width="10" height="172" fill="#163a52"/>
  <rect x="330" y="128" width="156" height="10" fill="#2a5d80"/>
  <rect x="330" y="290" width="156" height="10" fill="#12324a"/>

  <!-- door leaves -->
  <rect x="342" y="138" width="80" height="152" fill="#20537a"/>
  <rect x="422" y="138" width="52" height="152" fill="#1d4a6e"/>
  <rect x="420" y="138" width="4" height="152" fill="#12324a"/>

  <!-- locking rods -->
  <g fill="#cdd6dd">
    <rect x="362" y="142" width="5" height="144" rx="2"/>
    <rect x="398" y="142" width="5" height="144" rx="2"/>
    <rect x="436" y="142" width="5" height="144" rx="2"/>
    <rect x="460" y="142" width="5" height="144" rx="2"/>
  </g>
  <g fill="#00A34A">
    <rect x="356" y="200" width="18" height="9" rx="3"/>
    <rect x="392" y="200" width="18" height="9" rx="3"/>
    <rect x="430" y="200" width="18" height="9" rx="3"/>
    <rect x="454" y="200" width="18" height="9" rx="3"/>
  </g>

  <!-- DIMENSION ARROWS -->
  <g stroke="#22190A" stroke-width="2" fill="none">
    <line x1="506" y1="128" x2="506" y2="300"/>
    <polyline points="500,138 506,128 512,138"/>
    <polyline points="500,290 506,300 512,290"/>
    <line x1="330" y1="322" x2="486" y2="322"/>
    <polyline points="340,316 330,322 340,328"/>
    <polyline points="476,316 486,322 476,328"/>
    <line x1="206" y1="268" x2="322" y2="308"/>
    <polyline points="216,267 206,268 212,277"/>
    <polyline points="312,301 322,308 314,309"/>
  </g>
  <text x="408" y="345" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#22190A" text-anchor="middle">6ft 6in wide (2.0m)</text>
  <text x="530" y="214" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#22190A" text-anchor="middle" transform="rotate(-90 530 214)">7ft high</text>
  <text x="250" y="300" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#22190A" text-anchor="middle" transform="rotate(10 250 300)">8ft long (2.4m)</text>
</svg>
