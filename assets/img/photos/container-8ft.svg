<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Illustration of an 8ft by 6ft 6in storage container">
  <rect width="640" height="360" fill="#e9eff4"/>
  <rect x="0" y="300" width="640" height="60" fill="#d7dfe6"/>
  <!-- container body -->
  <g>
    <rect x="190" y="110" width="200" height="190" fill="#1E4C6B"/>
    <polygon points="390,110 460,80 460,270 390,300" fill="#163a52"/>
    <polygon points="190,110 260,80 460,80 390,110" fill="#2a5d80"/>
    <g fill="#173f5a">
      <rect x="206" y="120" width="12" height="170"/><rect x="234" y="120" width="12" height="170"/>
      <rect x="262" y="120" width="12" height="170"/><rect x="290" y="120" width="12" height="170"/>
    </g>
    <!-- doors -->
    <rect x="316" y="118" width="70" height="176" fill="#00A34A"/>
    <rect x="348" y="118" width="4" height="176" fill="#008a3f"/>
    <rect x="326" y="150" width="8" height="60" rx="3" fill="#e6f6ee"/>
    <rect x="364" y="150" width="8" height="60" rx="3" fill="#e6f6ee"/>
  </g>
  <!-- dimension arrows -->
  <g stroke="#22190A" stroke-width="2" fill="none">
    <line x1="190" y1="330" x2="390" y2="330"/>
    <polyline points="200,324 190,330 200,336"/>
    <polyline points="380,324 390,330 380,336"/>
    <line x1="160" y1="110" x2="160" y2="300"/>
    <polyline points="154,120 160,110 166,120"/>
    <polyline points="154,290 160,300 166,290"/>
  </g>
  <text x="290" y="352" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#22190A" text-anchor="middle">8ft (2.4m)</text>
  <text x="148" y="210" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#22190A" text-anchor="middle" transform="rotate(-90 148 210)">6ft 6in (2.0m)</text>
</svg>
