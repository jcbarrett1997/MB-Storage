<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" role="img" aria-label="Cutaway of a 20ft storage container showing furniture and boxes that fit inside: sofa, wardrobe, fridge, mattress, boxes, table and a bicycle">
  <rect width="820" height="380" fill="#f2f5f8"/>

  <!-- ground -->
  <rect x="0" y="322" width="820" height="58" fill="#e2e7ec"/>
  <ellipse cx="400" cy="326" rx="380" ry="16" fill="#d3dae0"/>

  <!-- ============ CONTAINER SHELL (side cutaway) ============ -->
  <!-- roof -->
  <rect x="40" y="70" width="620" height="20" fill="#1E4C6B"/>
  <rect x="40" y="66" width="620" height="6" fill="#2a5d80"/>
  <!-- floor -->
  <rect x="40" y="300" width="640" height="22" fill="#163a52"/>
  <!-- back corner post (left) -->
  <rect x="40" y="70" width="20" height="252" fill="#163a52"/>
  <!-- interior back wall (subtle, corrugated) -->
  <rect x="60" y="90" width="600" height="210" fill="#eef2f5"/>
  <g stroke="#dde5ea" stroke-width="8">
    <line x1="96" y1="90" x2="96" y2="300"/><line x1="150" y1="90" x2="150" y2="300"/>
    <line x1="204" y1="90" x2="204" y2="300"/><line x1="258" y1="90" x2="258" y2="300"/>
    <line x1="312" y1="90" x2="312" y2="300"/><line x1="366" y1="90" x2="366" y2="300"/>
    <line x1="420" y1="90" x2="420" y2="300"/><line x1="474" y1="90" x2="474" y2="300"/>
    <line x1="528" y1="90" x2="528" y2="300"/><line x1="582" y1="90" x2="582" y2="300"/>
    <line x1="636" y1="90" x2="636" y2="300"/>
  </g>
  <!-- front right corner post -->
  <rect x="660" y="66" width="22" height="256" fill="#1E4C6B"/>
  <rect x="660" y="66" width="22" height="8" fill="#2a5d80"/>

  <!-- OPEN double doors, swung out to the right -->
  <g>
    <!-- door 1 -->
    <polygon points="682,74 742,60 742,300 682,316" fill="#20537a"/>
    <rect x="700" y="150" width="8" height="9" rx="3" fill="#00A34A"/>
    <line x1="712" y1="70" x2="712" y2="310" stroke="#12324a" stroke-width="3"/>
    <!-- door 2 -->
    <polygon points="742,60 760,66 760,306 742,300" fill="#1d4a6e"/>
  </g>

  <!-- ============ CONTENTS ============ -->
  <!-- WARDROBE (tall) -->
  <g>
    <rect x="74" y="150" width="70" height="150" fill="#8a6a45"/>
    <rect x="74" y="150" width="70" height="150" fill="none" stroke="#6f5436" stroke-width="3"/>
    <line x1="109" y1="150" x2="109" y2="300" stroke="#6f5436" stroke-width="3"/>
    <circle cx="103" cy="228" r="3.5" fill="#3e2f1c"/>
    <circle cx="115" cy="228" r="3.5" fill="#3e2f1c"/>
  </g>

  <!-- FRIDGE / appliance -->
  <g>
    <rect x="154" y="168" width="56" height="132" rx="6" fill="#e9edf0" stroke="#c4ccd2" stroke-width="3"/>
    <line x1="154" y1="222" x2="210" y2="222" stroke="#c4ccd2" stroke-width="3"/>
    <rect x="196" y="182" width="6" height="26" rx="3" fill="#9aa4ac"/>
    <rect x="196" y="236" width="6" height="30" rx="3" fill="#9aa4ac"/>
  </g>

  <!-- STACKED BOXES -->
  <g fill="#cf9b5e" stroke="#a97c42" stroke-width="2.5">
    <rect x="224" y="238" width="62" height="62"/>
    <rect x="230" y="180" width="54" height="58"/>
    <rect x="292" y="244" width="58" height="56"/>
  </g>
  <g stroke="#a97c42" stroke-width="2.5">
    <line x1="255" y1="238" x2="255" y2="300"/><line x1="224" y1="266" x2="286" y2="266"/>
    <line x1="257" y1="180" x2="257" y2="238"/>
    <line x1="321" y1="244" x2="321" y2="300"/>
  </g>
  <!-- tape strips -->
  <g fill="#e7c79a" opacity=".7"><rect x="248" y="180" width="18" height="58"/><rect x="246" y="238" width="18" height="62"/></g>

  <!-- SOFA (side silhouette) -->
  <g>
    <path d="M356 300 v-58 a14 14 0 0 1 14-14 h96 a14 14 0 0 1 14 14 v58 z" fill="#3f7d5a"/>
    <path d="M356 262 q0-20 20-20 h84 q20 0 20 20 v10 h-124 z" fill="#4d956c"/>
    <rect x="348" y="240" width="16" height="60" rx="7" fill="#356b4d"/>
    <rect x="476" y="240" width="16" height="60" rx="7" fill="#356b4d"/>
    <rect x="372" y="258" width="44" height="18" rx="6" fill="#59a67b"/>
    <rect x="420" y="258" width="44" height="18" rx="6" fill="#59a67b"/>
  </g>

  <!-- TABLE (top + legs) -->
  <g fill="#8a6a45">
    <rect x="508" y="236" width="104" height="12" rx="3"/>
    <rect x="514" y="248" width="9" height="52"/>
    <rect x="597" y="248" width="9" height="52"/>
  </g>

  <!-- MATTRESS leaning against door end -->
  <g>
    <rect x="626" y="120" width="26" height="182" rx="10" fill="#f4f6f8" stroke="#cfd7dd" stroke-width="3" transform="rotate(6 639 211)"/>
  </g>

  <!-- BICYCLE (front, on top of boxes area) -->
  <g stroke="#22303a" stroke-width="4" fill="none">
    <circle cx="392" cy="196" r="22"/>
    <circle cx="452" cy="196" r="22"/>
    <path d="M392 196 L423 196 L438 168 L452 196 M423 196 L432 168 L438 168 M452 196 L446 168"/>
  </g>
  <g fill="#22303a"><circle cx="392" cy="196" r="4"/><circle cx="452" cy="196" r="4"/></g>
  <path d="M430 165 h14" stroke="#00A34A" stroke-width="5" stroke-linecap="round"/>

  <!-- caption chip -->
  <g>
    <rect x="60" y="104" width="250" height="34" rx="17" fill="#00A34A"/>
    <text x="185" y="126" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">Fits a 3–4 bedroom house</text>
  </g>
</svg>
