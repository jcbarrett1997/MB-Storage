<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Illustration of a 20ft by 8ft storage container">
  <rect width="640" height="360" fill="#e9eff4"/>
  <rect x="0" y="300" width="640" height="60" fill="#d7dfe6"/>
  <!-- container body -->
  <g>
    <rect x="60" y="110" width="460" height="190" fill="#1E4C6B"/>
    <polygon points="520,110 590,80 590,270 520,300" fill="#163a52"/>
    <polygon points="60,110 130,80 590,80 520,110" fill="#2a5d80"/>
    <!-- corrugation -->
    <g fill="#173f5a">
      <rect x="80" y="120" width="14" height="170"/><rect x="112" y="120" width="14" height="170"/>
      <rect x="144" y="120" width="14" height="170"/><rect x="176" y="120" width="14" height="170"/>
      <rect x="208" y="120" width="14" height="170"/><rect x="240" y="120" width="14" height="170"/>
      <rect x="272" y="120" width="14" height="170"/><rect x="304" y="120" width="14" height="170"/>
      <rect x="336" y="120" width="14" height="170"/><rect x="368" y="120" width="14" height="170"/>
      <rect x="400" y="120" width="14" height="170"/><rect x="432" y="120" width="14" height="170"/>
    </g>
    <!-- doors -->
    <rect x="458" y="118" width="58" height="176" fill="#00A34A"/>
    <rect x="484" y="118" width="4" height="176" fill="#008a3f"/>
    <rect x="466" y="150" width="8" height="60" rx="3" fill="#e6f6ee"/>
    <rect x="498" y="150" width="8" height="60" rx="3" fill="#e6f6ee"/>
  </g>
  <!-- dimension arrows -->
  <g stroke="#22190A" stroke-width="2" fill="none">
    <line x1="60" y1="330" x2="520" y2="330"/>
    <polyline points="70,324 60,330 70,336"/>
    <polyline points="510,324 520,330 510,336"/>
    <line x1="30" y1="110" x2="30" y2="300"/>
    <polyline points="24,120 30,110 36,120"/>
    <polyline points="24,290 30,300 36,290"/>
  </g>
  <text x="290" y="352" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#22190A" text-anchor="middle">20ft (6.1m)</text>
  <text x="18" y="210" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#22190A" text-anchor="middle" transform="rotate(-90 18 210)">8ft (2.4m)</text>
</svg>
